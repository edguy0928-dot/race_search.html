<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>競馬レース検索</title>
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --border:     #30363d;
      --accent:     #d4a017;
      --accent-dim: rgba(212,160,23,0.15);
      --text:       #e6edf3;
      --muted:      #8b949e;
      --dim:        #484f58;
      --green:      #3fb950;
      --blue:       #58a6ff;
      --red:        #f85149;
      --gold:       #ffd700;
      --silver:     #c0c0c0;
      --bronze:     #cd7f32;
      --r:          12px;
      --r-sm:       8px;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN',
                   'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .hd {
      position: sticky; top: 0; z-index: 200;
      background: rgba(13,17,23,.92);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .hd-title {
      font-size: 16px; font-weight: 700;
      color: var(--accent); letter-spacing: .04em;
      white-space: nowrap; flex-shrink: 0;
    }
    .hd-right {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; flex-shrink: 0;
    }
    .hd-count {
      font-size: 12px; color: var(--muted); white-space: nowrap;
    }
    .hd-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .hd-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 11px;
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; touch-action: manipulation;
      transition: background .15s, border-color .15s;
    }
    .hd-btn:active { background: var(--border); }
    .hd-btn.add { border-color: var(--accent); color: var(--accent); }
    .hd-btn.del { border-color: var(--red);    color: var(--red);    }

    /* ── Init / Upload ── */
    #initWrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 52px); padding: 24px;
    }
    .init-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 32px 24px;
      text-align: center; max-width: 380px; width: 100%;
    }
    .init-icon { font-size: 52px; margin-bottom: 12px; }
    .init-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .init-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--r-sm);
      padding: 20px; margin-bottom: 16px; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone.over { border-color: var(--accent); background: var(--accent-dim); }
    .drop-text { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .btn-upload {
      background: var(--accent); color: #000; border: none;
      border-radius: var(--r-sm); padding: 11px 28px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s;
    }
    .btn-upload:active { opacity: .75; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: max(env(safe-area-inset-bottom), 16px) + 8px;
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; padding: 10px 20px;
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; z-index: 999;
      transition: transform .3s ease, opacity .3s ease; opacity: 0;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Filter Panel ── */
    #appWrap { display: none; }
    .f-wrap { padding: 12px 14px 0; }
    .f-toggle {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 12px 16px; color: var(--text);
      font-size: 14px; font-weight: 600;
      cursor: pointer; display: flex; align-items: center;
      justify-content: space-between; gap: 8px;
      touch-action: manipulation; transition: background .15s;
    }
    .f-toggle:active { background: var(--surface2); }
    .f-arrow { transition: transform .25s; display: inline-block; }
    .f-arrow.open { transform: rotate(180deg); }
    .f-panel {
      background: var(--surface); border: 1px solid var(--border);
      border-top: none; border-radius: 0 0 var(--r) var(--r);
      overflow: hidden; max-height: 0; transition: max-height .35s ease;
    }
    .f-panel.open { max-height: 9999px; }
    .f-inner { padding: 16px; }
    .f-group { margin-bottom: 14px; }
    .f-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 12px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      touch-action: manipulation; user-select: none;
      transition: background .12s, color .12s, border-color .12s, transform .1s;
    }
    .pill:active { transform: scale(.93); }
    .pill.on {
      background: var(--accent); border-color: var(--accent);
      color: #000; font-weight: 700;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .finput {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 12px;
      color: var(--text); font-size: 14px; width: 100%; outline: none;
      transition: border-color .2s;
    }
    .finput:focus { border-color: var(--accent); }
    .finput::placeholder { color: var(--dim); }
    input[type="date"].finput { color-scheme: dark; }
    .f-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-search {
      flex: 1; background: var(--accent); color: #000; border: none;
      border-radius: var(--r-sm); padding: 13px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s;
    }
    .btn-search:active { opacity: .8; }
    .btn-reset {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 13px 16px; color: var(--muted);
      font-size: 15px; cursor: pointer; touch-action: manipulation;
    }

    /* ── Results Bar ── */
    .r-bar {
      padding: 10px 14px; margin-top: 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .r-count { font-size: 13px; color: var(--muted); }
    .r-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .sort-sel {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 7px 10px;
      color: var(--text); font-size: 12px; outline: none;
    }

    /* ── Race Cards ── */
    .r-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
    .r-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; transition: border-color .15s;
    }
    .c-top {
      padding: 11px 14px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .c-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.4; min-width: 0; word-break: break-word; white-space: normal; }
    .c-badge {
      font-size: 11px; font-weight: 800; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .bg-g1  { background: var(--gold);    color: #000; }
    .bg-g2  { background: var(--silver);  color: #000; }
    .bg-g3  { background: var(--bronze);  color: #fff; }
    .bg-op  { background: #4a90e2;        color: #fff; }
    .bg-opl { background: #5c6bc0;        color: #fff; }
    .bg-3w  { background: var(--green);   color: #000; }
    .bg-2w  { background: var(--blue);    color: #000; }
    .bg-1w  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .bg-low { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .c-meta {
      padding: 10px 14px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 4px;
    }
    .mi { display: flex; flex-direction: column; gap: 2px; }
    .mk { font-size: 10px; color: var(--dim); letter-spacing: .04em; }
    .mv { font-size: 13px; color: var(--text); font-weight: 500; }
    .mv.ac { color: var(--accent); font-weight: 700; font-size: 14px; }
    .c-times {
      background: var(--surface2); padding: 9px 14px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }
    .ti { text-align: center; }
    .tk { font-size: 10px; color: var(--dim); }
    .tv { font-size: 14px; font-weight: 600; color: var(--text); }
    .tv.w { color: var(--accent); font-size: 16px; font-weight: 800; }
    .c-more {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--border); padding: 9px;
      color: var(--muted); font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; touch-action: manipulation; transition: background .15s;
    }
    .c-more:active { background: var(--surface2); }
    .c-more .arr { transition: transform .25s; }
    .c-more .arr.open { transform: rotate(180deg); }
    .c-detail {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease; border-top: 0 solid var(--border);
    }
    .c-detail.open { max-height: 9999px; border-top: 1px solid var(--border); }
    .d-inner { padding: 12px 14px; }
    .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    .d-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 9px; background: var(--surface2);
      border-radius: var(--r-sm); font-size: 12px; gap: 4px;
    }
    .dk { color: var(--muted); white-space: nowrap; }
    .dv { color: var(--text); font-weight: 600; text-align: right; }
    .sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin: 10px 0 6px;
    }
    .lap-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
    .lap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 7px; text-align: center; min-width: 44px;
    }
    .ln { font-size: 9px; color: var(--dim); }
    .lt { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Pagination ── */
    .pg {
      padding: 16px; display: flex;
      align-items: center; justify-content: center;
      gap: 6px; flex-wrap: wrap;
    }
    .pg-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 13px;
      color: var(--text); font-size: 13px; cursor: pointer;
      touch-action: manipulation; min-width: 40px; text-align: center;
      transition: background .12s, color .12s;
    }
    .pg-btn.cur { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .pg-btn:disabled { opacity: .3; cursor: default; }
    .pg-sep { color: var(--dim); font-size: 13px; padding: 0 2px; }

    /* ── Empty / Loading ── */
    .empty, .loading {
      text-align: center; padding: 56px 16px;
      color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Keibalab Links ── */
    .klab-wrap { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
    .klab-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .klab-link {
      display: inline-block;
      background: var(--surface2); border: 1px solid var(--blue);
      border-radius: 20px; padding: 6px 13px;
      font-size: 12px; font-weight: 600; color: var(--blue);
      text-decoration: none; transition: background .15s;
      touch-action: manipulation;
    }
    .klab-link:hover, .klab-link:active { background: rgba(88,166,255,.12); }
    .klab-too-many { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Average Card ── */
    .avg-card {
      margin: 10px 12px 0;
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: var(--r); overflow: hidden;
    }
    .avg-header {
      padding: 9px 14px;
      background: var(--accent-dim); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .avg-title { font-size: 13px; font-weight: 700; color: var(--accent); }
    .avg-count { font-size: 12px; color: var(--muted); }
    .avg-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .btn-race-detail {
      width: 100%; background: var(--accent); border: none;
      border-top: 1px solid rgba(0,0,0,.15);
      color: #000; font-size: 13px; font-weight: 700;
      padding: 11px; cursor: pointer; touch-action: manipulation;
      transition: opacity .15s;
    }
    .btn-race-detail:active { opacity: .8; }

    @media (min-width: 640px) {
      .c-meta  { grid-template-columns: repeat(12, 1fr); padding: 8px 10px; gap: 4px 2px; }
      .c-meta .mk { font-size: 9px; }
      .c-meta .mv { font-size: 11px; }
      .c-meta .mv.ac { font-size: 12px; }
      .avg-card { margin: 10px 20px 0; }
      .avg-meta { grid-template-columns: repeat(6, 1fr) !important; padding: 10px 14px !important; gap: 8px 4px !important; }
      .avg-meta .mk { font-size: 10px !important; }
      .avg-meta .mv { font-size: 13px !important; }
      .avg-meta .mv.ac { font-size: 14px !important; }
      .d-grid  { grid-template-columns: repeat(3, 1fr); }
      .r-list  { padding: 10px 20px; }
      .f-wrap  { padding: 12px 20px 0; }
    }
  </style>
</head>
<body>

<!-- ── Header ── -->
<header class="hd">
  <div class="hd-title">🏇 競馬レース検索</div>
  <div class="hd-right" id="hdRight" style="display:none">
    <div class="hd-count" id="hdCount"></div>
    <button class="hd-btn add" onclick="document.getElementById('fi').click()">＋追加</button>
    <button class="hd-btn del" onclick="clearData()">削除</button>
  </div>
</header>

<!-- file inputs (hidden) -->
<input type="file" id="fi"    accept=".csv" style="display:none">
<input type="file" id="fiAdd" accept=".csv" style="display:none">

<!-- ── Init Screen ── -->
<div id="initWrap">
  <div class="init-card">
    <div class="init-icon">🏇</div>
    <div class="init-title">競馬レース検索</div>
    <div class="init-sub">allracerecord.csv を読み込むと<br>次回以降は自動で復元されます</div>
    <div class="drop-zone" id="dropZone">
      <div class="drop-text">CSVをここにドロップ、または</div>
      <button class="btn-upload" onclick="document.getElementById('fi').click()">ファイルを選択</button>
    </div>
  </div>
</div>

<!-- ── App ── -->
<div id="appWrap">

  <div class="f-wrap">
    <button class="f-toggle" onclick="togglePanel()">
      <span>🔍 検索フィルタ</span>
      <span class="f-arrow" id="farrow">▼</span>
    </button>
    <div class="f-panel" id="fpanel">
    <div class="f-inner">

      <div class="f-group">
        <div class="f-label">年月日</div>
        <div class="row2">
          <input type="date" class="finput" id="dFrom">
          <input type="date" class="finput" id="dTo">
        </div>
      </div>

      <div class="f-group">
        <div class="f-label">開催場所</div>
        <div class="pill-row" id="venueRow"></div>
      </div>

      <div class="f-group">
        <div class="f-label">コース</div>
        <div class="pill-row">
          <button class="pill" data-g="course" data-v="芝"   onclick="tog(this)">芝（内）</button>
          <button class="pill" data-g="course" data-v="芝外" onclick="tog(this)">芝外回り</button>
          <button class="pill" data-g="course" data-v="ダート" onclick="tog(this)">ダート</button>
        </div>
      </div>

      <div class="f-group">
        <div class="f-label">距離 — 1つ選択（場所・コースで絞り込まれます）</div>
        <div class="pill-row" id="distRow"><span style="color:var(--dim);font-size:13px">場所またはコースを選ぶと候補が表示されます</span></div>
      </div>

      <div class="f-group">
        <div class="f-label">馬場状態</div>
        <div class="pill-row">
          <button class="pill" data-g="baba" data-v="1" onclick="tog(this)">良</button>
          <button class="pill" data-g="baba" data-v="2" onclick="tog(this)">稍重</button>
          <button class="pill" data-g="baba" data-v="3" onclick="tog(this)">重</button>
          <button class="pill" data-g="baba" data-v="4" onclick="tog(this)">不良</button>
        </div>
      </div>

      <div class="f-group">
        <div class="f-label">クラス</div>
        <div class="pill-row">
          <button class="pill" data-g="cls" data-v="195" onclick="tog(this)">G1</button>
          <button class="pill" data-g="cls" data-v="179" onclick="tog(this)">G2</button>
          <button class="pill" data-g="cls" data-v="163" onclick="tog(this)">G3</button>
          <button class="pill" data-g="cls" data-v="131" onclick="tog(this)">オープン</button>
          <button class="pill" data-g="cls" data-v="115" onclick="tog(this)">OP(L)</button>
          <button class="pill" data-g="cls" data-v="67"  onclick="tog(this)">3勝クラス</button>
          <button class="pill" data-g="cls" data-v="43"  onclick="tog(this)">2勝クラス</button>
          <button class="pill" data-g="cls" data-v="23"  onclick="tog(this)">1勝クラス</button>
          <button class="pill" data-g="cls" data-v="7"   onclick="tog(this)">未勝利</button>
          <button class="pill" data-g="cls" data-v="15"  onclick="tog(this)">新馬</button>
        </div>
      </div>

      <div class="f-group">
        <div class="f-label">世代</div>
        <div class="pill-row">
          <button class="pill" data-g="gen" data-v="11" onclick="tog(this)">2歳</button>
          <button class="pill" data-g="gen" data-v="12" onclick="tog(this)">3歳</button>
          <button class="pill" data-g="gen" data-v="13" onclick="tog(this)">3歳以上</button>
          <button class="pill" data-g="gen" data-v="14" onclick="tog(this)">4歳以上</button>
        </div>
      </div>

      <div class="f-actions">
        <button class="btn-search" onclick="search()">検索する</button>
        <button class="btn-reset"  onclick="reset()">リセット</button>
      </div>

    </div>
    </div>
  </div>

  <div class="r-bar">
    <div class="r-count" id="rcount"></div>
    <select class="sort-sel" id="sortSel" onchange="search()">
      <option value="dd">日付 新→古</option>
      <option value="da">日付 古→新</option>
      <option value="ta">1着タイム 速→遅</option>
      <option value="td">1着タイム 遅→速</option>
      <option value="za">距離 短→長</option>
      <option value="zd">距離 長→短</option>
    </select>
  </div>

  <div id="avgWrap"></div>
  <div id="rList" class="r-list"></div>
  <div id="pg" class="pg"></div>

</div>

<!-- ── Toast ── -->
<div id="toast"></div>

<script>
// =====================================================================
// IndexedDB
// =====================================================================
const DB_NAME  = 'keiba_race_db';
const DB_VER   = 1;
const DB_STORE = 'data';

function dbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbSave(rows) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(rows, 'rows');
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}
async function dbLoad() {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx  = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get('rows');
    req.onsuccess = e => res(e.target.result || null);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbClear() {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete('rows');
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

const WX      = {'1':'晴','2':'曇','3':'小雨','4':'雨','5':'小雪','6':'雪'};

  '東京':'tokyo','中山':'nakayama','中京':'chukyo','京都':'kyoto',
  '阪神':'hanshin','小倉':'kokura',
};
const COURSE_URL = { '芝':'t', '芝外':'t', 'ダート':'d' };

const CLS_LBL ={'7':'未勝利','15':'新馬','23':'1勝クラス','43':'2勝クラス',
                 '67':'3勝クラス','115':'OP(L)','131':'オープン',

const CLS_BG  = {'195':'bg-g1','179':'bg-g2','163':'bg-g3',

                 '23':'bg-1w','7':'bg-low','15':'bg-low'};

const PAGE    = 30;

// =====================================================================
// CSV Parser
// =====================================================================
function parseCSV(text) {
  const nl    = text.includes('\r\n') ? '\r\n' : '\n';
  const lines = text.split(nl);
  const hdrs  = splitLine(lines[0]);
  const rows  = [];
  for (let i = 1; i < lines.length; i++) {
    const ln = lines[i].trim();
    if (!ln) continue;
    const vals = splitLine(ln);
    const obj  = {};
    hdrs.forEach((h, j) => { obj[h] = (vals[j] || '').trim(); });
    if (obj['レースID']) rows.push(obj);
  }
  return rows;
}
function splitLine(line) {
  const out = []; let inQ = false, cur = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
    else { cur += c; }
  }
  out.push(cur);
  return out;
}

// =====================================================================
// Date utils
// =====================================================================
function fmtDate(s) {
  if (!s || s.length < 6) return s;
  return `20${s.slice(0,2)}/${s.slice(2,4)}/${s.slice(4,6)}`;
}
function toISO(s) {
  if (!s || s.length < 6) return '';
  return `20${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`;
}

// Drag & drop on init screen
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], false);
});

function readFile(file, isAppend) {
  showToast('📂 読み込み中...');
  const reader = new FileReader();
  reader.onload = async e => {
    const buf = e.target.result;
    let text;
    // UTF-8(strict) → Shift-JIS → UTF-8(lenient) の順で試す
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(new Uint8Array(buf));
    } catch {
      try {
        text = new TextDecoder('shift-jis').decode(new Uint8Array(buf));
      } catch {
        text = new TextDecoder('utf-8').decode(new Uint8Array(buf));
      }
    }

    const newRows = parseCSV(text);
    let merged;

    if (isAppend && all.length > 0) {
      // dedup by レースID
      const existing = new Set(all.map(r => r['レースID']));
      const added    = newRows.filter(r => !existing.has(r['レースID']));
      merged = [...all, ...added];
      showToast(`✅ ${added.length.toLocaleString()}件を追加（重複スキップ: ${newRows.length - added.length}件）`, 3500);
    } else {
      merged = newRows;
      showToast(`✅ ${merged.length.toLocaleString()}件を読み込みました`);
    }

    try { await dbSave(merged); } catch(e) { console.warn('Save failed:', e); }
    initApp(merged, true);
  };
  reader.readAsArrayBuffer(file);
}

  const venues  = getActive('venue');

function search() {
  const dFrom   = document.getElementById('dFrom').value;
  const dTo     = document.getElementById('dTo').value;
  const venues  = getActive('venue');
  const courses = getActive('course');
  const dists   = getActive('dist');
  const babas   = getActive('baba');
  const clss    = getActive('cls');
  const gens    = getActive('gen');

  filtered = all.filter(r => {
    if (dFrom || dTo) {
      const iso = toISO(r['年月日']);
      if (dFrom && iso < dFrom) return false;
      if (dTo   && iso > dTo)   return false;
    }
    if (venues.length  && !venues.includes(r['場所名']))   return false;
    if (courses.length && !courses.includes(r['コースC'])) return false;
    if (dists.length   && !dists.includes(r['距離']))      return false;
    if (babas.length   && !babas.includes(r['馬場状態C'])) return false;
    if (clss.length    && !clss.includes(r['クラスC']))    return false;
    if (gens.length    && !gens.includes(r['世代限定C']))  return false;
    return true;
  });

  const s = document.getElementById('sortSel').value;
  filtered.sort((a, b) => {
    if (s === 'dd') return b['年月日'].localeCompare(a['年月日']);
    if (s === 'da') return a['年月日'].localeCompare(b['年月日']);
    if (s === 'ta') return (parseFloat(a['1着タイム'])||999)-(parseFloat(b['1着タイム'])||999);
    if (s === 'td') return (parseFloat(b['1着タイム'])||0)  -(parseFloat(a['1着タイム'])||0);
    if (s === 'za') return (parseFloat(a['距離'])||0)-(parseFloat(b['距離'])||0);
    if (s === 'zd') return (parseFloat(b['距離'])||0)-(parseFloat(a['距離'])||0);
    return 0;
  });

  raceListOpen = false;
  page = 1;
  render();
}

function v(r, k) { const x = r[k]; return (x && x !== '0') ? x : '-'; }

// ── 平均値計算 ──────────────────────────────────────────────
function computeAvg(races) {
  function avgF(key) {
    const vals = races.map(r => parseFloat(r[key])).filter(v => !isNaN(v) && v > 0);
    return vals.length ? { v: vals.reduce((s,x) => s+x, 0) / vals.length } : null;
  }
  function avgLap(from, to) {
    const vals = [];
    for (const r of races) {
      let sum = 0, ok = true;
      for (let i = from; i <= to; i++) {
        const x = parseFloat(r[`Lap${i}`]);
        if (!x || x <= 0) { ok = false; break; }
        sum += x;
      }
      if (ok) vals.push(sum);
    }
    return vals.length ? { v: vals.reduce((s,x) => s+x, 0) / vals.length } : null;
  }
  return {
    main: [
      { k: '1着タイム',  a: avgF('1着タイム'),          fmt: 'time', cls: 'ac' },
      { k: '前3F補正',   a: avgLap(1,3),                 fmt: 'time', cls: ''   },
      { k: '前5F補正',   a: avgLap(1,5),                 fmt: 'time', cls: ''   },
      { k: '1着上り3F',  a: avgF('1着上り3F'),           fmt: 'num',  cls: ''   },
      { k: 'PCI',        a: avgF('PCI'),                 fmt: 'num',  cls: ''   },
      { k: 'レースPCI',  a: avgF('レースPCI'),           fmt: 'num',  cls: ''   },
    ],
    detail: [
      { k: '頭数',        a: avgF('頭数'),               fmt: 'int'  },
      { k: '1〜2着差',   a: avgF('1〜2着着差'),         fmt: 'num'  },
      { k: '2着タイム',  a: avgF('2着タイム'),           fmt: 'time' },
      { k: '前3F通過',   a: avgF('前3F通過'),            fmt: 'num'  },
      { k: '後3F上り',   a: avgF('後3F上り'),            fmt: 'num'  },
      { k: '2〜3着差',   a: avgF('2〜3着着差'),         fmt: 'num'  },
      { k: '3着タイム',  a: avgF('3着タイム'),           fmt: 'time' },
      { k: '最速上り3F', a: avgF('最速上り3F'),          fmt: 'num'  },
      { k: '前5F通過',   a: avgF('前5F通過'),            fmt: 'time' },
      { k: '後5F上り',   a: avgF('後5F上り'),            fmt: 'time' },
      { k: '後2F上り',   a: avgF('後2F上り'),            fmt: 'num'  },
      { k: '後1F上り',   a: avgF('後1F上り'),            fmt: 'num'  },
      { k: '基準タイム', a: avgF('基準タイム'),           fmt: 'time' },
      { k: '全馬平均',   a: avgF('全馬平均タイム'),      fmt: 'time' },
      { k: '連対馬平均', a: avgF('連対馬平均タイム'),    fmt: 'time' },
      { k: '1〜3着平均', a: avgF('1〜3着平均タイム'),   fmt: 'time' },
      { k: 'レースAve-3F', a: avgF('レースAve-3F'),     fmt: 'num'  },
      { k: 'A-3F差',    a: avgF('A-3F差'),              fmt: 'num'  },
    ],
  };
}

function fmtA(item) {
  if (!item || !item.a) return null;
  const v = item.a.v;
  switch (item.fmt) {
    case 'time': return fmtTime(v.toFixed(1));
    case 'int':  return v.toFixed(0);
    default:     return v.toFixed(1);
  }
}

function buildKeibaLabLinks(races) {
  const seen = new Set();
  const combos = [];
  for (const r of races) {
    const v = r['場所名'], c = r['コースC'], d = r['距離'];
    if (!v || !c || !d) continue;
    const key = `${v}|${c}|${d}`;
    if (!seen.has(key)) { seen.add(key); combos.push({v, c, d}); }
  }
  if (combos.length === 0) return '';

  if (combos.length > 12) {
    return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><p class="klab-too-many">条件を絞り込むとリンクが表示されます（現在 ${combos.length} 通り）</p></div>`;
  }

  const links = combos.map(({v, c, d}) => {
    const vs = VENUE_URL[v], cs = COURSE_URL[c];
    if (!vs || !cs) return '';
    const url   = `https://www.keibalab.jp/yosou/coursedata/${vs}/${cs}${d}/`;
    const clbl  = c === 'ダート' ? 'ダート' : (c === '芝外' ? '芝(外)' : '芝(内)');
    return `<a href="${url}" target="_blank" rel="noopener" class="klab-link">${v} ${clbl} ${parseInt(d).toLocaleString()}m →</a>`;
  }).filter(Boolean).join('');

  if (!links) return '';
  return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><div class="klab-links">${links}</div></div>`;
}

// 秒数 → 分.秒.1/10秒 表記（例: 122.8 → "2.02.8"）
function fmtTime(val) {
  if (!val || val === '-') return '-';
  const t = parseFloat(val);
  if (isNaN(t) || t <= 0) return val;
  if (t < 60) return t.toFixed(1);                 // 1分未満は小数点第1位まで
  const mins = Math.floor(t / 60);
  const sec  = (t - mins * 60).toFixed(1);
  const [si, sd] = sec.split('.');
  return `${mins}.${si.padStart(2, '0')}.${sd}`;
}

// 時間フィールド用 v()（fmtTime 適用版）
function vt(r, k) { const x = r[k]; return (x && x !== '0') ? fmtTime(x) : '-'; }

// Lap合計（補正タイム）: 指定範囲のLapを合計して時間表記に変換
function lapSum(r, from, to) {
  let sum = 0;
  for (let i = from; i <= to; i++) {
    const val = parseFloat(r[`Lap${i}`]);
    if (!val || val <= 0) return '-';   // 1つでも欠損・ゼロなら無効
    sum += val;
  }
  return fmtTime(sum.toFixed(1));
}

function getLaps(r) {
  const out = [];
  for (let i = 1; i <= 18; i++) {
    const val = r[`Lap${i}`];
    if (val && parseFloat(val) > 0) out.push({ n: i, v: val });
  }
  return out;
}

function renderCard(r) {

  const wx   = WX[r['天候C']]          || r['天候C'];
  const gen  = GEN_LBL[r['世代限定C']] || r['世代限定C'];
  const id   = r['レースID'];
  const laps = getLaps(r);

  const lapHTML = laps.length ? `
    <div class="sec-label">ラップタイム</div>
    <div class="lap-wrap">
      ${laps.map(l=>`<div class="lap"><div class="ln">L${l.n}</div><div class="lt">${l.v}</div></div>`).join('')}
    </div>` : '';

  return `
<div class="r-card">
  <div class="c-top">
    <div class="c-name">${r['レース名']||'不明'}</div>

function xpand(id, btn) {
  const det  = document.getElementById(`det-${id}`);
  const arr  = document.getElementById(`arr-${id}`);
  const open = det.classList.toggle('open');
  arr.classList.toggle('open', open);
}

// =====================================================================
// Pagination
// =====================================================================
function renderPg(tot) {
  const pages = Math.ceil(tot / PAGE);
  if (pages <= 1) { document.getElementById('pg').innerHTML = ''; return; }

  let lo = Math.max(1, page - 2);
  let hi = Math.min(pages, lo + 4);
  lo     = Math.max(1, hi - 4);

  let h = `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  if (lo > 1) h += `<button class="pg-btn" onclick="goPage(1)">1</button><span class="pg-sep">…</span>`;
  for (let p = lo; p <= hi; p++)
    h += `<button class="pg-btn ${p===page?'cur':''}" onclick="goPage(${p})">${p}</button>`;
  if (hi < pages) h += `<span class="pg-sep">…</span><button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;
  h += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  document.getElementById('pg').innerHTML = h;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE);
  if (p < 1 || p > pages) return;
  page = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}
</script>
