<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="theme-color" content="#0d1117">
  <title>競馬レース検索</title>
  <style>
    :root {
      --bg:         #0d1117;
      --surface:    #161b22;
      --surface2:   #21262d;
      --border:     #30363d;
      --accent:     #d4a017;
      --accent-dim: rgba(212,160,23,0.15);
      --text:       #e6edf3;
      --muted:      #8b949e;
      --dim:        #484f58;
      --green:      #3fb950;
      --blue:       #58a6ff;
      --red:        #f85149;
      --gold:       #ffd700;
      --silver:     #c0c0c0;
      --bronze:     #cd7f32;
      --r:          12px;
      --r-sm:       8px;
    }
    *, *::before, *::after {
      box-sizing: border-box; margin: 0; padding: 0;
      -webkit-tap-highlight-color: transparent;
    }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN',
                   'Hiragino Sans', 'Yu Gothic UI', sans-serif;
      background: var(--bg); color: var(--text);
      min-height: 100vh;
      padding-bottom: max(env(safe-area-inset-bottom), 24px);
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    .hd {
      position: sticky; top: 0; z-index: 200;
      background: rgba(13,17,23,.92);
      backdrop-filter: saturate(180%) blur(16px);
      -webkit-backdrop-filter: saturate(180%) blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 10px 14px;
      display: flex; align-items: center; gap: 10px;
    }
    .hd-title {
      font-size: 16px; font-weight: 700;
      color: var(--accent); letter-spacing: .04em;
      white-space: nowrap; flex-shrink: 0;
    }
    .hd-right {
      display: flex; align-items: center; gap: 8px;
      margin-left: auto; flex-shrink: 0;
    }
    .hd-count {
      font-size: 12px; color: var(--muted); white-space: nowrap;
    }
    .hd-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .hd-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 5px 11px;
      color: var(--text); font-size: 12px; font-weight: 600;
      cursor: pointer; white-space: nowrap; touch-action: manipulation;
      transition: background .15s, border-color .15s;
    }
    .hd-btn:active { background: var(--border); }
    .hd-btn.add { border-color: var(--accent); color: var(--accent); }
    .hd-btn.del { border-color: var(--red);    color: var(--red);    }

    /* ── Init / Upload ── */
    #initWrap {
      display: flex; flex-direction: column;
      align-items: center; justify-content: center;
      min-height: calc(100vh - 52px); padding: 24px;
    }
    .init-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 32px 24px;
      text-align: center; max-width: 380px; width: 100%;
    }
    .init-icon { font-size: 52px; margin-bottom: 12px; }
    .init-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
    .init-sub { font-size: 13px; color: var(--muted); margin-bottom: 24px; line-height: 1.6; }
    .drop-zone {
      border: 2px dashed var(--border); border-radius: var(--r-sm);
      padding: 20px; margin-bottom: 16px; cursor: pointer;
      transition: border-color .2s, background .2s;
    }
    .drop-zone.over { border-color: var(--accent); background: var(--accent-dim); }
    .drop-text { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
    .btn-upload {
      background: var(--accent); color: #000; border: none;
      border-radius: var(--r-sm); padding: 11px 28px;
      font-size: 14px; font-weight: 700; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s;
    }
    .btn-upload:active { opacity: .75; }

    /* ── Toast ── */
    #toast {
      position: fixed; bottom: max(env(safe-area-inset-bottom), 16px) + 8px;
      left: 50%; transform: translateX(-50%) translateY(80px);
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 24px; padding: 10px 20px;
      font-size: 13px; font-weight: 600; color: var(--text);
      white-space: nowrap; z-index: 999;
      transition: transform .3s ease, opacity .3s ease; opacity: 0;
      pointer-events: none;
    }
    #toast.show { transform: translateX(-50%) translateY(0); opacity: 1; }

    /* ── Header back button ── */
    .hd-back {
      background: none; border: none;
      color: var(--blue); font-size: 14px; font-weight: 700;
      cursor: pointer; padding: 2px 8px 2px 0;
      touch-action: manipulation; white-space: nowrap; flex-shrink: 0;
    }
    .hd-back:active { opacity: .7; }

    /* ── Home menu ── */
    #appWrap { display: none; }
    .home-menu { padding: 20px 14px; display: flex; flex-direction: column; gap: 12px; }
    .home-card {
      width: 100%; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r);
      padding: 20px 18px; cursor: pointer;
      display: flex; align-items: center; gap: 14px;
      text-align: left; touch-action: manipulation;
      transition: border-color .15s, background .15s;
    }
    .home-card:active { background: var(--surface2); border-color: var(--accent); }
    .home-card-icon { font-size: 36px; flex-shrink: 0; line-height: 1; }
    .home-card-body { flex: 1; }
    .home-card-title { font-size: 18px; font-weight: 800; color: var(--text); margin-bottom: 4px; }
    .home-card-sub { font-size: 13px; color: var(--muted); line-height: 1.5; }
    .home-card-arrow { font-size: 24px; color: var(--dim); flex-shrink: 0; font-weight: 300; }

    /* ── Filter Panel ── */
    .f-wrap { padding: 12px 14px 0; }
    .f-inner { padding: 16px; background: var(--surface); border: 1px solid var(--border); border-radius: var(--r); }
    .f-group { margin-bottom: 14px; }
    .f-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 7px;
    }
    .pill-row { display: flex; flex-wrap: wrap; gap: 6px; }
    .pill {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 12px;
      font-size: 13px; color: var(--muted); cursor: pointer;
      touch-action: manipulation; user-select: none;
      transition: background .12s, color .12s, border-color .12s, transform .1s;
    }
    .pill:active { transform: scale(.93); }
    .pill.on {
      background: var(--accent); border-color: var(--accent);
      color: #000; font-weight: 700;
    }
    .row2 { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
    .finput {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 9px 12px;
      color: var(--text); font-size: 14px; width: 100%; outline: none;
      transition: border-color .2s;
    }
    .finput:focus { border-color: var(--accent); }
    .finput::placeholder { color: var(--dim); }
    input[type="date"].finput { color-scheme: dark; }
    .f-actions { display: flex; gap: 8px; margin-top: 16px; }
    .btn-search {
      flex: 1; background: var(--accent); color: #000; border: none;
      border-radius: var(--r-sm); padding: 13px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s;
    }
    .btn-search:active { opacity: .8; }
    .btn-reset {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 13px 16px; color: var(--muted);
      font-size: 15px; cursor: pointer; touch-action: manipulation;
    }

    /* ── Results Bar ── */
    .r-bar {
      padding: 10px 14px; margin-top: 12px;
      display: flex; align-items: center; justify-content: space-between;
      border-bottom: 1px solid var(--border);
    }
    .r-count { font-size: 13px; color: var(--muted); }
    .r-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .sort-sel {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 7px 10px;
      color: var(--text); font-size: 12px; outline: none;
    }

    /* ── Race Cards ── */
    .r-list { padding: 10px 12px; display: flex; flex-direction: column; gap: 10px; }
    .r-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); overflow: hidden; transition: border-color .15s;
    }
    .c-top {
      padding: 11px 14px;
      display: flex; align-items: flex-start;
      justify-content: space-between; gap: 8px;
      border-bottom: 1px solid var(--border);
    }
    .c-name { font-size: 15px; font-weight: 700; flex: 1; line-height: 1.4; min-width: 0; word-break: break-word; white-space: normal; }
    .c-badge {
      font-size: 11px; font-weight: 800; padding: 3px 9px;
      border-radius: 20px; white-space: nowrap; flex-shrink: 0;
    }
    .bg-g1  { background: var(--gold);    color: #000; }
    .bg-g2  { background: var(--silver);  color: #000; }
    .bg-g3  { background: var(--bronze);  color: #fff; }
    .bg-op  { background: #4a90e2;        color: #fff; }
    .bg-opl { background: #5c6bc0;        color: #fff; }
    .bg-3w  { background: var(--green);   color: #000; }
    .bg-2w  { background: var(--blue);    color: #000; }
    .bg-1w  { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .bg-low { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
    .c-meta {
      padding: 10px 14px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 8px 4px;
    }
    .mi { display: flex; flex-direction: column; gap: 2px; }
    .mk { font-size: 10px; color: var(--dim); letter-spacing: .04em; }
    .mv { font-size: 13px; color: var(--text); font-weight: 500; }
    .mv.ac { color: var(--accent); font-weight: 700; font-size: 14px; }
    .c-times {
      background: var(--surface2); padding: 9px 14px;
      display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px;
    }
    .ti { text-align: center; }
    .tk { font-size: 10px; color: var(--dim); }
    .tv { font-size: 14px; font-weight: 600; color: var(--text); }
    .tv.w { color: var(--accent); font-size: 16px; font-weight: 800; }
    .c-more {
      width: 100%; background: none; border: none;
      border-top: 1px solid var(--border); padding: 9px;
      color: var(--muted); font-size: 12px;
      display: flex; align-items: center; justify-content: center; gap: 6px;
      cursor: pointer; touch-action: manipulation; transition: background .15s;
    }
    .c-more:active { background: var(--surface2); }
    .c-more .arr { transition: transform .25s; }
    .c-more .arr.open { transform: rotate(180deg); }
    .c-detail {
      max-height: 0; overflow: hidden;
      transition: max-height .35s ease; border-top: 0 solid var(--border);
    }
    .c-detail.open { max-height: 9999px; border-top: 1px solid var(--border); }
    .d-inner { padding: 12px 14px; }
    .d-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 8px; }
    .d-item {
      display: flex; justify-content: space-between; align-items: center;
      padding: 6px 9px; background: var(--surface2);
      border-radius: var(--r-sm); font-size: 12px; gap: 4px;
    }
    .dk { color: var(--muted); white-space: nowrap; }
    .dv { color: var(--text); font-weight: 600; text-align: right; }
    .sec-label {
      font-size: 11px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin: 10px 0 6px;
    }
    .lap-wrap { display: flex; flex-wrap: wrap; gap: 4px; }
    .lap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: 6px; padding: 5px 7px; text-align: center; min-width: 44px;
    }
    .ln { font-size: 9px; color: var(--dim); }
    .lt { font-size: 13px; font-weight: 600; color: var(--text); }

    /* ── Pagination ── */
    .pg {
      padding: 16px; display: flex;
      align-items: center; justify-content: center;
      gap: 6px; flex-wrap: wrap;
    }
    .pg-btn {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r-sm); padding: 8px 13px;
      color: var(--text); font-size: 13px; cursor: pointer;
      touch-action: manipulation; min-width: 40px; text-align: center;
      transition: background .12s, color .12s;
    }
    .pg-btn.cur { background: var(--accent); border-color: var(--accent); color: #000; font-weight: 700; }
    .pg-btn:disabled { opacity: .3; cursor: default; }
    .pg-sep { color: var(--dim); font-size: 13px; padding: 0 2px; }

    /* ── Empty / Loading ── */
    .empty, .loading {
      text-align: center; padding: 56px 16px;
      color: var(--muted); font-size: 14px;
    }
    .spinner {
      width: 32px; height: 32px;
      border: 3px solid var(--border); border-top-color: var(--accent);
      border-radius: 50%; animation: spin .8s linear infinite;
      margin: 0 auto 12px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
    ::-webkit-scrollbar { width: 4px; }
    ::-webkit-scrollbar-track { background: var(--bg); }
    ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

    /* ── Keibalab Links ── */
    .klab-wrap { padding: 8px 14px 12px; border-top: 1px solid var(--border); }
    .klab-links { display: flex; flex-wrap: wrap; gap: 6px; margin-top: 6px; }
    .klab-link {
      display: inline-block;
      background: var(--surface2); border: 1px solid var(--blue);
      border-radius: 20px; padding: 6px 13px;
      font-size: 12px; font-weight: 600; color: var(--blue);
      text-decoration: none; transition: background .15s;
      touch-action: manipulation;
    }
    .klab-link:hover, .klab-link:active { background: rgba(88,166,255,.12); }
    .klab-too-many { font-size: 12px; color: var(--muted); margin-top: 4px; }

    /* ── Average Card ── */
    .avg-card {
      margin: 10px 12px 0;
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: var(--r); overflow: hidden;
    }
    .avg-header {
      padding: 9px 14px;
      background: var(--accent-dim); border-bottom: 1px solid var(--border);
      display: flex; align-items: center; justify-content: space-between;
    }
    .avg-title { font-size: 13px; font-weight: 700; color: var(--accent); }
    .avg-count { font-size: 12px; color: var(--muted); }
    .avg-count em { color: var(--accent); font-style: normal; font-weight: 700; }
    .btn-race-detail {
      width: 100%; background: var(--accent); border: none;
      border-top: 1px solid rgba(0,0,0,.15);
      color: #000; font-size: 13px; font-weight: 700;
      padding: 11px; cursor: pointer; touch-action: manipulation;
      transition: opacity .15s;
    }
    .btn-race-detail:active { opacity: .8; }

    @media (min-width: 640px) {
      .c-meta  { grid-template-columns: repeat(12, 1fr); padding: 8px 10px; gap: 4px 2px; }
      .c-meta .mk { font-size: 9px; }
      .c-meta .mv { font-size: 11px; }
      .c-meta .mv.ac { font-size: 12px; }
      .avg-card { margin: 10px 20px 0; }
      .avg-meta { grid-template-columns: repeat(6, 1fr) !important; padding: 10px 14px !important; gap: 8px 4px !important; }
      .avg-meta .mk { font-size: 10px !important; }
      .avg-meta .mv { font-size: 13px !important; }
      .avg-meta .mv.ac { font-size: 14px !important; }
      .d-grid  { grid-template-columns: repeat(3, 1fr); }
      .r-list  { padding: 10px 20px; }
      .f-wrap  { padding: 12px 20px 0; }
    }

    /* ═══════════════════════════════════════════════
       本日の傾向
    ═══════════════════════════════════════════════ */
    .trend-inner { padding: 14px; }

    /* ── エントリーカード ── */
    .trend-entry {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r); padding: 14px; margin-bottom: 12px;
    }
    .te-head {
      display: flex; align-items: center; justify-content: space-between;
      margin-bottom: 14px;
    }
    .te-num { font-size: 13px; font-weight: 700; color: var(--blue); }
    .te-del {
      background: none; border: 1px solid var(--red); color: var(--red);
      border-radius: 20px; padding: 4px 10px; font-size: 12px;
      cursor: pointer; touch-action: manipulation;
    }

    /* ── タイム入力 ── */
    .time-rows { display: flex; flex-direction: column; gap: 10px; }
    .time-row  { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; }
    .ti-lbl { font-size: 12px; color: var(--muted); min-width: 72px; }
    .ti-field { display: flex; align-items: center; gap: 5px; }
    .ti-box {
      background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text);
      font-size: 18px; font-weight: 700; text-align: center;
      padding: 8px 4px; outline: none;
      -moz-appearance: textfield;
    }
    .ti-box::-webkit-inner-spin-button,
    .ti-box::-webkit-outer-spin-button { -webkit-appearance: none; }
    .ti-box:focus { border-color: var(--blue); }
    .ti-box.w-min { width: 44px; }
    .ti-box.w-sec { width: 52px; }
    .ti-box.w-tenth { width: 40px; }
    .ti-unit { font-size: 13px; color: var(--muted); }
    .ti-opt { font-size: 11px; color: var(--dim); margin-left: 4px; }

    /* ── 比較ボタン ── */
    .btn-compare {
      width: 100%; background: var(--blue); color: #fff; border: none;
      border-radius: var(--r-sm); padding: 12px;
      font-size: 15px; font-weight: 800; cursor: pointer;
      touch-action: manipulation; transition: opacity .15s; margin-top: 14px;
    }
    .btn-compare:active { opacity: .8; }
    .btn-add-entry {
      width: 100%; background: none; border: 1px dashed var(--border);
      color: var(--muted); border-radius: var(--r);
      padding: 11px; font-size: 13px; cursor: pointer;
      touch-action: manipulation; transition: background .15s;
    }
    .btn-add-entry:active { background: var(--surface2); }

    /* ── 比較結果カード ── */
    .tr-card {
      margin-top: 10px; background: var(--surface);
      border: 1px solid var(--border); border-radius: var(--r); overflow: hidden;
    }
    .tr-cond {
      padding: 8px 12px; font-size: 11px; font-weight: 700;
      color: var(--blue); background: rgba(88,166,255,.08);
      border-bottom: 1px solid var(--border); line-height: 1.6;
    }
    .tr-section { padding: 10px 12px; border-bottom: 1px solid var(--border); }
    .tr-section:last-child { border-bottom: none; }
    .tr-sec-title {
      font-size: 10px; font-weight: 700; color: var(--muted);
      text-transform: uppercase; letter-spacing: .08em; margin-bottom: 8px;
    }
    .tr-grid { display: grid; grid-template-columns: 1fr; gap: 6px; }
    .tr-cell { background: var(--surface2); border-radius: var(--r-sm); padding: 8px 10px; }
    .tr-k { font-size: 10px; color: var(--dim); margin-bottom: 3px; }
    .tr-v { font-size: 15px; font-weight: 700; }
    .tr-v.today { color: var(--accent); font-size: 17px; }
    .tr-v.faster { color: var(--green); }
    .tr-v.slower { color: var(--red); }
    .tr-v.same   { color: var(--muted); }
    .tr-sub { font-size: 11px; color: var(--dim); margin-top: 2px; }
    .tr-pct { font-size: 12px; color: var(--muted); margin-top: 6px; padding: 6px 10px; background: var(--surface2); border-radius: var(--r-sm); }
    .tr-pct em { color: var(--accent); font-style: normal; font-weight: 700; }
    .tr-empty { padding: 24px; text-align: center; color: var(--muted); font-size: 13px; }
    /* ── ラップ貼り付け ── */
    .lap-paste {
      width: 100%; background: var(--bg); border: 1px solid var(--border);
      border-radius: var(--r-sm); color: var(--text); font-size: 13px;
      font-family: monospace; padding: 9px 10px; resize: none; outline: none;
      transition: border-color .2s; line-height: 1.5;
    }
    .lap-paste:focus  { border-color: var(--blue); }
    .lap-paste.ok  { border-color: var(--green); }
    .lap-paste.err { border-color: var(--red); }
    .lap-parsed {
      font-size: 11px; color: var(--green); margin-top: 5px;
      min-height: 16px; line-height: 1.4;
    }
    .lap-parsed.err { color: var(--red); }

    .btn-to-summary {
      display: block; width: 100%;
      background: var(--surface2); border: 1px solid var(--accent);
      border-radius: var(--r-sm); padding: 11px;
      color: var(--accent); font-size: 13px; font-weight: 700;
      cursor: pointer; text-align: center; margin-top: 8px;
      touch-action: manipulation; transition: background .15s;
    }
    .btn-to-summary:active { background: var(--accent-dim); }

    /* ── データ管理ページ ── */
    .data-page { padding: 16px 14px; display: flex; flex-direction: column; gap: 16px; }
    .data-section {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: var(--r); padding: 18px 16px;
    }
    .data-section.danger-section { border-color: rgba(248,81,73,.35); }
    .data-section-title { font-size: 16px; font-weight: 800; color: var(--text); margin-bottom: 6px; }
    .data-section-sub { font-size: 13px; color: var(--muted); line-height: 1.6; margin-bottom: 14px; }
    .data-count-wrap {
      display: flex; align-items: center; justify-content: space-between;

<script>
// =====================================================================
// IndexedDB
// =====================================================================
const DB_NAME  = 'keiba_race_db';
const DB_VER   = 1;
const DB_STORE = 'data';

function dbOpen() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(DB_NAME, DB_VER);
    req.onupgradeneeded = e => e.target.result.createObjectStore(DB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbSave(rows) {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).put(rows, 'rows');
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}
async function dbLoad() {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx  = db.transaction(DB_STORE, 'readonly');
    const req = tx.objectStore(DB_STORE).get('rows');
    req.onsuccess = e => res(e.target.result || null);
    req.onerror   = e => rej(e.target.error);
  });
}
async function dbClear() {
  const db = await dbOpen();
  return new Promise((res, rej) => {
    const tx = db.transaction(DB_STORE, 'readwrite');
    tx.objectStore(DB_STORE).delete('rows');
    tx.oncomplete = res;
    tx.onerror = e => rej(e.target.error);
  });
}

// =====================================================================
// Constants
// =====================================================================
const BABA    = {'1':'良','2':'稍重','3':'重','4':'不良'};
const WX      = {'1':'晴','2':'曇','3':'小雨','4':'雨','5':'小雪','6':'雪'};
const VENUE_URL = {
  '札幌':'sapporo','函館':'hakodate','福島':'fukushima','新潟':'niigata',
  '東京':'tokyo','中山':'nakayama','中京':'chukyo','京都':'kyoto',
  '阪神':'hanshin','小倉':'kokura',
};
const COURSE_URL = { '芝':'t', '芝外':'t', 'ダート':'d' };

const CLS_LBL ={'7':'未勝利','15':'新馬','23':'1勝クラス','43':'2勝クラス',
                 '67':'3勝クラス','115':'OP(L)','131':'オープン',
                 '163':'G3','179':'G2','195':'G1'};
const CLS_BG  = {'195':'bg-g1','179':'bg-g2','163':'bg-g3',
                 '131':'bg-op','115':'bg-opl','67':'bg-3w','43':'bg-2w',
                 '23':'bg-1w','7':'bg-low','15':'bg-low'};
const GEN_LBL = {'11':'2歳','12':'3歳','13':'3歳以上','14':'4歳以上'};
const PAGE    = 30;

let all = [], filtered = [], page = 1, raceListOpen = false;

// =====================================================================
// CSV Parser
// =====================================================================
function parseCSV(text) {
  const nl    = text.includes('\r\n') ? '\r\n' : '\n';
  const lines = text.split(nl);
  const hdrs  = splitLine(lines[0]);
  const rows  = [];
  for (let i = 1; i < lines.length; i++) {
    const ln = lines[i].trim();
    if (!ln) continue;
    const vals = splitLine(ln);
    const obj  = {};
    hdrs.forEach((h, j) => { obj[h] = (vals[j] || '').trim(); });
    if (obj['レースID']) rows.push(obj);
  }
  return rows;
}
function splitLine(line) {
  const out = []; let inQ = false, cur = '';
  for (let i = 0; i < line.length; i++) {
    const c = line[i];
    if (c === '"') { inQ = !inQ; }
    else if (c === ',' && !inQ) { out.push(cur); cur = ''; }
    else { cur += c; }
  }
  out.push(cur);
  return out;
}

// =====================================================================
// Date utils
// =====================================================================
function fmtDate(s) {
  if (!s || s.length < 6) return s;
  return `20${s.slice(0,2)}/${s.slice(2,4)}/${s.slice(4,6)}`;
}
function toISO(s) {
  if (!s || s.length < 6) return '';
  return `20${s.slice(0,2)}-${s.slice(2,4)}-${s.slice(4,6)}`;
}

// =====================================================================
// Toast
// =====================================================================
let toastTimer = null;
function showToast(msg, ms = 2500) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => t.classList.remove('show'), ms);
}

// =====================================================================
// Startup — try loading from IndexedDB
// =====================================================================
(async () => {
  try {
    const rows = await dbLoad();
    if (rows && rows.length > 0) {
      initApp(rows, false);
    }
  } catch (e) {
    console.warn('IndexedDB load failed:', e);
  }
})();

// =====================================================================
// File handling
// =====================================================================

// Drag & drop on init screen
const dz = document.getElementById('dropZone');
dz.addEventListener('dragover',  e => { e.preventDefault(); dz.classList.add('over'); });
dz.addEventListener('dragleave', () => dz.classList.remove('over'));
dz.addEventListener('drop', e => {
  e.preventDefault(); dz.classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], false);
});

// Drag & drop on data page
const dzData = document.getElementById('dropZoneData');
dzData.addEventListener('dragover',  e => { e.preventDefault(); dzData.classList.add('over'); });
dzData.addEventListener('dragleave', () => dzData.classList.remove('over'));
dzData.addEventListener('drop', e => {
  e.preventDefault(); dzData.classList.remove('over');
  if (e.dataTransfer.files[0]) readFile(e.dataTransfer.files[0], all.length > 0);
});

function readFile(file, isAppend) {
  showToast('📂 読み込み中...');
  const reader = new FileReader();
  reader.onload = async e => {
    const buf = e.target.result;
    let text;
    // UTF-8(strict) → Shift-JIS → UTF-8(lenient) の順で試す
    try {
      text = new TextDecoder('utf-8', { fatal: true }).decode(new Uint8Array(buf));
    } catch {
      try {
        text = new TextDecoder('shift-jis').decode(new Uint8Array(buf));
      } catch {
        text = new TextDecoder('utf-8').decode(new Uint8Array(buf));
      }
    }

    const newRows = parseCSV(text);
    let merged;

    if (isAppend && all.length > 0) {
      // dedup by レースID
      const existing = new Set(all.map(r => r['レースID']));
      const added    = newRows.filter(r => !existing.has(r['レースID']));
      merged = [...all, ...added];
      showToast(`✅ ${added.length.toLocaleString()}件を追加（重複スキップ: ${newRows.length - added.length}件）`, 3500);
    } else {
      merged = newRows;
      showToast(`✅ ${merged.length.toLocaleString()}件を読み込みました`);
    }

    try { await dbSave(merged); } catch(e) { console.warn('Save failed:', e); }
    initApp(merged, true);
  };
  reader.readAsArrayBuffer(file);
}

// =====================================================================
// Init app
// =====================================================================
function initApp(rows, animate) {
  all = rows;

  // Build venue pills
  const venues = [...new Set(all.map(r => r['場所名']).filter(Boolean))].sort();
  document.getElementById('venueRow').innerHTML = venues.map(v =>
    `<button class="pill" data-g="venue" data-v="${v}" onclick="tog(this)">${v}</button>`
  ).join('');

  document.getElementById('initWrap').style.display = 'none';
  document.getElementById('appWrap').style.display  = 'block';
  document.getElementById('hdRight').style.display  = 'flex';
  updateHdCount();
  updateDataPageCount();
  updateDistPills();

  navigateTo('home');

  document.getElementById('rList').innerHTML =
    `<div class="empty">🔍 条件を設定して「検索する」を押してください</div>`;
  document.getElementById('rcount').innerHTML = '';
  document.getElementById('pg').innerHTML     = '';
}

// =====================================================================
// Page navigation
// =====================================================================
function navigateTo(page) {
  ['home', 'search', 'trend', 'data'].forEach(p => {
    document.getElementById(`pg-${p}`).style.display = p === page ? '' : 'none';
  });
  const btnBack = document.getElementById('btnBack');
  btnBack.style.display = page === 'home' ? 'none' : '';
  if (page === 'trend' && trendIdCounter === 0) addTrendEntry();
  if (page === 'data') updateDataPageCount();
}

function navigateHome() {
  navigateTo('home');
}

function updateHdCount() {
  document.getElementById('hdCount').innerHTML =
    `💾 <em>${all.length.toLocaleString()}</em>件`;
}

function updateDataPageCount() {
  const el = document.getElementById('dataPageCount');
  if (el) el.textContent = `${all.length.toLocaleString()} 件`;
}

// ── ファイル選択ハンドラ（単一に統合）──
let addMode = false;
document.getElementById('fi').addEventListener('click', () => {
  addMode = all.length > 0;
});
document.getElementById('fi').addEventListener('change', function(e) {
  const file = e.target.files[0];
  e.target.value = '';          // 同じファイルの再選択を可能にする
  if (file) readFile(file, addMode);
  addMode = false;
});

// =====================================================================
// Filter panel
// =====================================================================
function tog(btn) {
  btn.classList.toggle('on');
  // 場所またはコースが変わったら距離候補を再構築
  if (btn.dataset.g === 'venue' || btn.dataset.g === 'course') updateDistPills();
}

// 距離: 単一選択
function togDist(btn) {
  const wasOn = btn.classList.contains('on');
  document.querySelectorAll('.pill[data-g="dist"].on').forEach(b => b.classList.remove('on'));
  if (!wasOn) btn.classList.add('on');
}

// 場所・コース選択に連動して距離の選択肢を動的生成
function updateDistPills() {
  const venues  = getActive('venue');
  const courses = getActive('course');
  const prevDist = getActive('dist')[0]; // 選択済み距離を記憶

  let pool = all;
  if (venues.length)  pool = pool.filter(r => venues.includes(r['場所名']));
  if (courses.length) pool = pool.filter(r => courses.includes(r['コースC']));

  const dists = [...new Set(pool.map(r => r['距離']).filter(Boolean))]
    .sort((a, b) => parseInt(a) - parseInt(b));

  const row = document.getElementById('distRow');
  if (!row) return;

  if (dists.length === 0) {
    row.innerHTML = `<span style="color:var(--dim);font-size:13px">該当する距離がありません</span>`;
    return;
  }

  row.innerHTML = dists.map(d =>
    `<button class="pill${d === prevDist ? ' on' : ''}" data-g="dist" data-v="${d}" onclick="togDist(this)">${parseInt(d).toLocaleString()}m</button>`
  ).join('');
}

function getActive(g) {
  return [...document.querySelectorAll(`.pill[data-g="${g}"].on`)].map(b => b.dataset.v);
}

// =====================================================================
// Search
// =====================================================================
function search() {
  const dFrom   = document.getElementById('dFrom').value;
  const dTo     = document.getElementById('dTo').value;
  const venues  = getActive('venue');
  const courses = getActive('course');
  const dists   = getActive('dist');
  const babas   = getActive('baba');
  const clss    = getActive('cls');
  const gens    = getActive('gen');

  filtered = all.filter(r => {
    if (dFrom || dTo) {
      const iso = toISO(r['年月日']);
      if (dFrom && iso < dFrom) return false;
      if (dTo   && iso > dTo)   return false;
    }
    if (venues.length  && !venues.includes(r['場所名']))   return false;
    if (courses.length && !courses.includes(r['コースC'])) return false;
    if (dists.length   && !dists.includes(r['距離']))      return false;
    if (babas.length   && !babas.includes(r['馬場状態C'])) return false;
    if (clss.length    && !clss.includes(r['クラスC']))    return false;
    if (gens.length    && !gens.includes(r['世代限定C']))  return false;
    return true;
  });

  const s = document.getElementById('sortSel').value;
  filtered.sort((a, b) => {
    if (s === 'dd') return b['年月日'].localeCompare(a['年月日']);
    if (s === 'da') return a['年月日'].localeCompare(b['年月日']);
    if (s === 'ta') return (parseFloat(a['1着タイム'])||999)-(parseFloat(b['1着タイム'])||999);
    if (s === 'td') return (parseFloat(b['1着タイム'])||0)  -(parseFloat(a['1着タイム'])||0);
    if (s === 'za') return (parseFloat(a['距離'])||0)-(parseFloat(b['距離'])||0);
    if (s === 'zd') return (parseFloat(b['距離'])||0)-(parseFloat(a['距離'])||0);
    return 0;
  });

  raceListOpen = false;
  page = 1;
  render();
}

function reset() {
  document.getElementById('dFrom').value = '';
  document.getElementById('dTo').value   = '';
  document.querySelectorAll('.pill.on').forEach(b => b.classList.remove('on'));
  updateDistPills(); // 全距離を再表示
  filtered = [];
  raceListOpen = false;
  page = 1;
  document.getElementById('avgWrap').innerHTML = '';
  document.getElementById('rList').innerHTML =
    `<div class="empty">🔍 条件を設定して「検索する」を押してください</div>`;
  document.getElementById('rcount').innerHTML = '';
  document.getElementById('pg').innerHTML     = '';
}

function v(r, k) { const x = r[k]; return (x && x !== '0') ? x : '-'; }

// ── 平均値計算 ──────────────────────────────────────────────
function computeAvg(races) {
  function avgF(key) {
    const vals = races.map(r => parseFloat(r[key])).filter(v => !isNaN(v) && v > 0);
    return vals.length ? { v: vals.reduce((s,x) => s+x, 0) / vals.length } : null;
  }
  function avgLap(from, to) {
    const vals = [];
    for (const r of races) {
      let sum = 0, ok = true;
      for (let i = from; i <= to; i++) {
        const x = parseFloat(r[`Lap${i}`]);
        if (!x || x <= 0) { ok = false; break; }
        sum += x;
      }
      if (ok) vals.push(sum);
    }
    return vals.length ? { v: vals.reduce((s,x) => s+x, 0) / vals.length } : null;
  }
  return {
    main: [
      { k: '1着タイム',  a: avgF('1着タイム'),          fmt: 'time', cls: 'ac' },
      { k: '前3F補正',   a: avgLap(1,3),                 fmt: 'time', cls: ''   },
      { k: '前5F補正',   a: avgLap(1,5),                 fmt: 'time', cls: ''   },
      { k: '1着上り3F',  a: avgF('1着上り3F'),           fmt: 'num',  cls: ''   },
      { k: 'PCI',        a: avgF('PCI'),                 fmt: 'num',  cls: ''   },
      { k: 'レースPCI',  a: avgF('レースPCI'),           fmt: 'num',  cls: ''   },
    ],
    detail: [
      { k: '頭数',        a: avgF('頭数'),               fmt: 'int'  },
      { k: '1〜2着差',   a: avgF('1〜2着着差'),         fmt: 'num'  },
      { k: '2着タイム',  a: avgF('2着タイム'),           fmt: 'time' },
      { k: '前3F通過',   a: avgF('前3F通過'),            fmt: 'num'  },
      { k: '後3F上り',   a: avgF('後3F上り'),            fmt: 'num'  },
      { k: '2〜3着差',   a: avgF('2〜3着着差'),         fmt: 'num'  },
      { k: '3着タイム',  a: avgF('3着タイム'),           fmt: 'time' },
      { k: '最速上り3F', a: avgF('最速上り3F'),          fmt: 'num'  },
      { k: '前5F通過',   a: avgF('前5F通過'),            fmt: 'time' },
      { k: '後5F上り',   a: avgF('後5F上り'),            fmt: 'time' },
      { k: '後2F上り',   a: avgF('後2F上り'),            fmt: 'num'  },
      { k: '後1F上り',   a: avgF('後1F上り'),            fmt: 'num'  },
      { k: '基準タイム', a: avgF('基準タイム'),           fmt: 'time' },
      { k: '全馬平均',   a: avgF('全馬平均タイム'),      fmt: 'time' },
      { k: '連対馬平均', a: avgF('連対馬平均タイム'),    fmt: 'time' },
      { k: '1〜3着平均', a: avgF('1〜3着平均タイム'),   fmt: 'time' },
      { k: 'レースAve-3F', a: avgF('レースAve-3F'),     fmt: 'num'  },
      { k: 'A-3F差',    a: avgF('A-3F差'),              fmt: 'num'  },
    ],
  };
}

function fmtA(item) {
  if (!item || !item.a) return null;
  const v = item.a.v;
  switch (item.fmt) {
    case 'time': return fmtTime(v.toFixed(1));
    case 'int':  return v.toFixed(0);
    default:     return v.toFixed(1);
  }
}

function buildKeibaLabLinks(races) {
  const seen = new Set();
  const combos = [];
  for (const r of races) {
    const v = r['場所名'], c = r['コースC'], d = r['距離'];
    if (!v || !c || !d) continue;
    const key = `${v}|${c}|${d}`;
    if (!seen.has(key)) { seen.add(key); combos.push({v, c, d}); }
  }
  if (combos.length === 0) return '';

  if (combos.length > 12) {
    return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><p class="klab-too-many">条件を絞り込むとリンクが表示されます（現在 ${combos.length} 通り）</p></div>`;
  }

  const links = combos.map(({v, c, d}) => {
    const vs = VENUE_URL[v], cs = COURSE_URL[c];
    if (!vs || !cs) return '';
    const url   = `https://www.keibalab.jp/yosou/coursedata/${vs}/${cs}${d}/`;
    const clbl  = c === 'ダート' ? 'ダート' : (c === '芝外' ? '芝(外)' : '芝(内)');
    return `<a href="${url}" target="_blank" rel="noopener" class="klab-link">${v} ${clbl} ${parseInt(d).toLocaleString()}m →</a>`;
  }).filter(Boolean).join('');

  if (!links) return '';
  return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><div class="klab-links">${links}</div></div>`;
}

function buildTrendKlabLinks(venues, courses, dists) {
  if (!dists.length) return '';
  const vList = venues.length  ? venues  : Object.keys(VENUE_URL);
  const cList = courses.length ? courses : Object.keys(COURSE_URL);
  const combos = [];
  for (const v of vList) for (const c of cList) for (const d of dists) combos.push({v, c, d});
  if (!combos.length) return '';
  if (combos.length > 12) {
    return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><p class="klab-too-many">条件を絞り込むとリンクが表示されます（現在 ${combos.length} 通り）</p></div>`;
  }
  const links = combos.map(({v, c, d}) => {
    const vs = VENUE_URL[v], cs = COURSE_URL[c];
    if (!vs || !cs) return '';
    const url  = `https://www.keibalab.jp/yosou/coursedata/${vs}/${cs}${d}/`;
    const clbl = c === 'ダート' ? 'ダート' : (c === '芝外' ? '芝(外)' : '芝(内)');
    return `<a href="${url}" target="_blank" rel="noopener" class="klab-link">${v} ${clbl} ${parseInt(d).toLocaleString()}m →</a>`;
  }).filter(Boolean).join('');
  if (!links) return '';
  return `<div class="klab-wrap"><div class="sec-label">📎 コースデータ (keibalab)</div><div class="klab-links">${links}</div></div>`;
}

// 秒数 → 分.秒.1/10秒 表記（例: 122.8 → "2.02.8"）
function fmtTime(val) {
  if (!val || val === '-') return '-';
  const t = parseFloat(val);
  if (isNaN(t) || t <= 0) return val;
  if (t < 60) return t.toFixed(1);                 // 1分未満は小数点第1位まで
  const mins = Math.floor(t / 60);
  const sec  = (t - mins * 60).toFixed(1);
  const [si, sd] = sec.split('.');
  return `${mins}.${si.padStart(2, '0')}.${sd}`;
}

// 時間フィールド用 v()（fmtTime 適用版）
function vt(r, k) { const x = r[k]; return (x && x !== '0') ? fmtTime(x) : '-'; }

// Lap合計（補正タイム）: 指定範囲のLapを合計して時間表記に変換
function lapSum(r, from, to) {
  let sum = 0;
  for (let i = from; i <= to; i++) {
    const val = parseFloat(r[`Lap${i}`]);
    if (!val || val <= 0) return '-';   // 1つでも欠損・ゼロなら無効
    sum += val;
  }
  return fmtTime(sum.toFixed(1));
}

function getLaps(r) {
  const out = [];
  for (let i = 1; i <= 18; i++) {
    const val = r[`Lap${i}`];
    if (val && parseFloat(val) > 0) out.push({ n: i, v: val });
  }
  return out;
}

// =====================================================================
// Pagination
// =====================================================================
function renderPg(tot) {
  const pages = Math.ceil(tot / PAGE);
  if (pages <= 1) { document.getElementById('pg').innerHTML = ''; return; }

  let lo = Math.max(1, page - 2);
  let hi = Math.min(pages, lo + 4);
  lo     = Math.max(1, hi - 4);

  let h = `<button class="pg-btn" onclick="goPage(${page-1})" ${page===1?'disabled':''}>‹</button>`;
  if (lo > 1) h += `<button class="pg-btn" onclick="goPage(1)">1</button><span class="pg-sep">…</span>`;
  for (let p = lo; p <= hi; p++)
    h += `<button class="pg-btn ${p===page?'cur':''}" onclick="goPage(${p})">${p}</button>`;
  if (hi < pages) h += `<span class="pg-sep">…</span><button class="pg-btn" onclick="goPage(${pages})">${pages}</button>`;
  h += `<button class="pg-btn" onclick="goPage(${page+1})" ${page===pages?'disabled':''}>›</button>`;
  document.getElementById('pg').innerHTML = h;
}

function goPage(p) {
  const pages = Math.ceil(filtered.length / PAGE);
  if (p < 1 || p > pages) return;
  page = p;
  render();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

// ── エントリー追加 / 削除 ─────────────────────────────────────────

function addTrendEntry() {
  const id  = ++trendIdCounter;
  const div = document.createElement('div');
  div.id        = `te-${id}`;
  div.className = 'trend-entry';
  div.innerHTML = buildEntryHTML(id);
  document.getElementById('trendEntries').appendChild(div);
  addTrendSlot(id);
  renumberEntries();
}

function removeTrendEntry(id) {
  const el = document.getElementById(`te-${id}`);
  if (el) el.remove();
  trendSummary = trendSummary.filter(item => item.entryId !== id);
  renumberEntries();
  renderTrendSummary();
}

function scrollToSummary() {
  const el = document.getElementById('trendSummaryWrap');
  if (el && el.style.display !== 'none') {
    el.scrollIntoView({ behavior: 'smooth', block: 'start' });
  }
}

function renumberEntries() {
  document.querySelectorAll('#trendEntries .trend-entry').forEach((el, i) => {
    const n = el.querySelector('.te-num');
    if (n) n.textContent = `レース #${i + 1}`;
  });
}

// ── スロット追加 / 削除 ───────────────────────────────────────────

function addTrendSlot(entryId) {
  const slotId  = ++trendSlotCounter;
  const slotsEl = document.getElementById(`te-slots-${entryId}`);
  if (!slotsEl) return;
  const slotNum = slotsEl.querySelectorAll('.te-slot').length + 1;
  const tmp = document.createElement('div');
  tmp.innerHTML = buildSlotHTML(entryId, slotId, slotNum);
  slotsEl.appendChild(tmp.firstElementChild);
  autoAdvanceSetup(slotId);
  updateSlotDeleteBtns(entryId);
}

function removeTrendSlot(slotId, entryId) {
  const el = document.getElementById(`ts-${slotId}`);
  if (el) el.remove();
  trendSummary = trendSummary.filter(item => item.id !== slotId);
  renderTrendSummary();
  updateSlotDeleteBtns(entryId);
}

function updateSlotDeleteBtns(entryId) {
  const slotsEl = document.getElementById(`te-slots-${entryId}`);
  if (!slotsEl) return;
  const slots = slotsEl.querySelectorAll('.te-slot');
  const show  = slots.length > 1;
  slots.forEach(s => {
    const btn = s.querySelector('.ts-del');
    if (btn) btn.style.display = show ? '' : 'none';
  });
}

function storeTrendResult(slotId, entryId, d) {
  trendSummary = trendSummary.filter(item => item.id !== slotId);
  if (!d.pool || !d.timeStats) return;
  const {timeStats, todayTime, agariStats, todayAgari, mae3FStats, todayMae3F, mae5FStats, todayMae5F} = d;
  // スロット番号 = エントリー内の現在位置
  const slotsEl = document.getElementById(`te-slots-${entryId}`);
  const slots   = slotsEl ? [...slotsEl.querySelectorAll('.te-slot')] : [];
  const slotEl  = document.getElementById(`ts-${slotId}`);
  const slotNum = slotEl ? slots.indexOf(slotEl) + 1 : 1;
  trendSummary.push({
    id: slotId,
    entryId,
    slotNum,
    condKey:       d.condLabel,
    condLabel:     d.condLabel,
    pool:          d.pool,
    todayTime,
    timeAvg:       timeStats.avg,
    timeDiff:      todayTime  != null ? todayTime  - timeStats.avg     : null,
    timeDiffTrim:  todayTime  != null ? todayTime  - timeStats.trimAvg : null,
    todayAgari,
    agariAvg:      agariStats ? agariStats.avg     : null,
    agariDiff:     todayAgari != null && agariStats ? todayAgari - agariStats.avg     : null,
    agariDiffTrim: todayAgari != null && agariStats ? todayAgari - agariStats.trimAvg : null,
    todayMae3F,
    mae3FAvg:      mae3FStats ? mae3FStats.avg     : null,
    mae3FDiff:     todayMae3F != null && mae3FStats ? todayMae3F - mae3FStats.avg     : null,
    mae3FDiffTrim: todayMae3F != null && mae3FStats ? todayMae3F - mae3FStats.trimAvg : null,
    todayMae5F,
    mae5FAvg:      mae5FStats ? mae5FStats.avg     : null,
    mae5FDiff:     todayMae5F != null && mae5FStats ? todayMae5F - mae5FStats.avg     : null,
    mae5FDiffTrim: todayMae5F != null && mae5FStats ? todayMae5F - mae5FStats.trimAvg : null,
  });
  renderTrendSummary();
}

function renderTrendSummary() {
  const wrap = document.getElementById('trendSummaryWrap');
  if (!wrap) return;
  if (!trendSummary.length) { wrap.innerHTML = ''; wrap.style.display = 'none'; return; }

  const diffCls = v => v == null ? '' : v < -0.05 ? 'faster' : v > 0.05 ? 'slower' : 'same';
  const diffStr = v => {
    if (v == null) return '-';
    const sign = v < -0.05 ? '▼' : v > 0.05 ? '▲' : '±';
    return `${sign}${Math.abs(v).toFixed(1)}秒`;
  };
  const meanOf = arr => {
    const v = arr.filter(x => x != null);
    return v.length ? v.reduce((s, x) => s + x, 0) / v.length : null;
  };
  const mkRow = (label, cells) =>
    `<tr><th class="tsm-row-h">${label}</th>${cells.map(({v, c}) =>
      `<td class="tsm-td${c ? ' ' + c : ''}">${v}</td>`).join('')}</tr>`;
  const mkSep = (label, span) =>
    `<tr class="tsm-sep"><th colspan="${span}">${label}</th></tr>`;

  const groups = new Map();
  for (const item of trendSummary) {
    if (!groups.has(item.condKey)) groups.set(item.condKey, []);
    groups.get(item.condKey).push(item);
  }

  let html = '<div class="tsm-wrap"><div class="tsm-title">📋 比較一覧</div>';

  for (const [, items] of groups) {
    items.sort((a, b) => a.id - b.id);
    const showAvg = items.length >= 2;
    const span    = items.length + 1 + (showAvg ? 1 : 0);

    // 列ヘッダー（平均列を先頭に）
    const entryOrder = [...document.querySelectorAll('#trendEntries .trend-entry')]
      .map(el => +el.id.slice(3));
    const dispNum = id => { const p = entryOrder.indexOf(id); return p >= 0 ? p + 1 : id; };
    const avgTh = showAvg ? `<th class="tsm-avg-th">平均</th>` : '';
    const thHtml = avgTh + items.map(i => {
      const multi = items.filter(x => x.entryId === i.entryId).length > 1;
      return multi
        ? `<th>レース #${dispNum(i.entryId)}<span class="tsm-slot-lbl">タイム #${i.slotNum}</span></th>`
        : `<th>レース #${dispNum(i.entryId)}</th>`;
    }).join('');

    // avg セルを先頭に差し込むヘルパー
    const ac = (avgVal, extraCls, itemCells) => {
      const a = showAvg ? [{v: avgVal, c: `avg-col${extraCls ? ' '+extraCls : ''}`}] : [];
      return [...a, ...itemCells];
    };

    // 1着タイム
    const aTodayTime   = meanOf(items.map(i => i.todayTime));
    const aTimeAvg     = meanOf(items.map(i => i.timeAvg));
    const aTimeDiff    = meanOf(items.map(i => i.timeDiff));
    const aTimeDiffTr  = meanOf(items.map(i => i.timeDiffTrim));

    const rows = [
      mkSep('1着タイム', span),
      mkRow('今日のタイム',    ac(aTodayTime  != null ? fmtTime(aTodayTime.toFixed(1))  : '-', 'today',               items.map(i => ({v: i.todayTime != null ? fmtTime(i.todayTime)           : '-', c: 'today'})))),
      mkRow('過去平均',         ac(aTimeAvg    != null ? fmtTime(aTimeAvg.toFixed(1))    : '-', '',                    items.map(i => ({v: i.timeAvg   != null ? fmtTime(i.timeAvg.toFixed(1))  : '-', c: ''})))),
      mkRow('全体平均との差',   ac(diffStr(aTimeDiff),   diffCls(aTimeDiff),              items.map(i => ({v: diffStr(i.timeDiff),     c: diffCls(i.timeDiff)})))),
      mkRow('外れ値除外との差', ac(diffStr(aTimeDiffTr), diffCls(aTimeDiffTr),            items.map(i => ({v: diffStr(i.timeDiffTrim), c: diffCls(i.timeDiffTrim)})))),
    ];

    if (items.some(i => i.todayAgari != null || i.agariAvg != null)) {
      const aAgari    = meanOf(items.map(i => i.todayAgari));
      const aAgariAvg = meanOf(items.map(i => i.agariAvg));
      const aAgariD   = meanOf(items.map(i => i.agariDiff));
      const aAgariDTr = meanOf(items.map(i => i.agariDiffTrim));
      rows.push(
        mkSep('上り3F', span),
        mkRow('今日のタイム',    ac(aAgari    != null ? fmtTime(aAgari.toFixed(1))    : '-', 'today',       items.map(i => ({v: i.todayAgari != null ? fmtTime(i.todayAgari)           : '-', c: i.todayAgari != null ? 'today' : ''})))),
        mkRow('過去平均',         ac(aAgariAvg != null ? fmtTime(aAgariAvg.toFixed(1)) : '-', '',            items.map(i => ({v: i.agariAvg   != null ? fmtTime(i.agariAvg.toFixed(1))  : '-', c: ''})))),
        mkRow('全体平均との差',   ac(diffStr(aAgariD),   diffCls(aAgariD),             items.map(i => ({v: diffStr(i.agariDiff),     c: diffCls(i.agariDiff)})))),
        mkRow('外れ値除外との差', ac(diffStr(aAgariDTr), diffCls(aAgariDTr),           items.map(i => ({v: diffStr(i.agariDiffTrim), c: diffCls(i.agariDiffTrim)})))),
      );
    }
    if (items.some(i => i.todayMae3F != null || i.mae3FAvg != null)) {
      const aMae    = meanOf(items.map(i => i.todayMae3F));
      const aMaeAvg = meanOf(items.map(i => i.mae3FAvg));
      const aMaeD   = meanOf(items.map(i => i.mae3FDiff));
      const aMaeDTr = meanOf(items.map(i => i.mae3FDiffTrim));
      rows.push(
        mkSep('前3F', span),
        mkRow('今日のタイム',    ac(aMae    != null ? fmtTime(aMae.toFixed(1))    : '-', 'today',       items.map(i => ({v: i.todayMae3F != null ? fmtTime(i.todayMae3F)           : '-', c: i.todayMae3F != null ? 'today' : ''})))),
        mkRow('過去平均',         ac(aMaeAvg != null ? fmtTime(aMaeAvg.toFixed(1)) : '-', '',            items.map(i => ({v: i.mae3FAvg   != null ? fmtTime(i.mae3FAvg.toFixed(1))  : '-', c: ''})))),
        mkRow('全体平均との差',   ac(diffStr(aMaeD),   diffCls(aMaeD),             items.map(i => ({v: diffStr(i.mae3FDiff),     c: diffCls(i.mae3FDiff)})))),
        mkRow('外れ値除外との差', ac(diffStr(aMaeDTr), diffCls(aMaeDTr),           items.map(i => ({v: diffStr(i.mae3FDiffTrim), c: diffCls(i.mae3FDiffTrim)})))),
      );
    }
    if (items.some(i => i.todayMae5F != null || i.mae5FAvg != null)) {
      const aM5    = meanOf(items.map(i => i.todayMae5F));
      const aM5Avg = meanOf(items.map(i => i.mae5FAvg));
      const aM5D   = meanOf(items.map(i => i.mae5FDiff));
      const aM5DTr = meanOf(items.map(i => i.mae5FDiffTrim));
      rows.push(
        mkSep('前5F', span),
        mkRow('今日のタイム',    ac(aM5    != null ? fmtTime(aM5.toFixed(1))    : '-', 'today',       items.map(i => ({v: i.todayMae5F != null ? fmtTime(i.todayMae5F)           : '-', c: i.todayMae5F != null ? 'today' : ''})))),
        mkRow('過去平均',         ac(aM5Avg != null ? fmtTime(aM5Avg.toFixed(1)) : '-', '',            items.map(i => ({v: i.mae5FAvg   != null ? fmtTime(i.mae5FAvg.toFixed(1))  : '-', c: ''})))),
        mkRow('全体平均との差',   ac(diffStr(aM5D),   diffCls(aM5D),             items.map(i => ({v: diffStr(i.mae5FDiff),     c: diffCls(i.mae5FDiff)})))),
        mkRow('外れ値除外との差', ac(diffStr(aM5DTr), diffCls(aM5DTr),           items.map(i => ({v: diffStr(i.mae5FDiffTrim), c: diffCls(i.mae5FDiffTrim)})))),
      );
    }

    html += `
<div class="tsm-group">
  <div class="tsm-cond">${items[0].condLabel}  /  対象 ${items[0].pool}件</div>
  <div class="tsm-tbl-wrap">
    <table class="tsm-tbl">
      <thead><tr><th class="tsm-row-h"></th>${thHtml}</tr></thead>
      <tbody>${rows.join('')}</tbody>
    </table>
  </div>
</div>`;
  }

  html += '</div>';
  wrap.innerHTML = html;
  wrap.style.display = '';
}

// ── ピル操作 ─────────────────────────────────────────────────────────

function togTE(btn) {
  btn.classList.toggle('on');
  const id = btn.dataset.tid;
  if (btn.dataset.g === 'tv' || btn.dataset.g === 'tc') updateTEDistPills(id);
}
function togTEPeriod(btn, id) {
  document.querySelectorAll(`[data-tid="${id}"][data-g="tp"]`).forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
  const cr = document.getElementById(`te-cr-${id}`);
  if (cr) cr.style.display = btn.dataset.v === 'custom' ? 'block' : 'none';
}
function togTEDist(btn) {
  const id = btn.dataset.tid;
  document.querySelectorAll(`[data-tid="${id}"][data-g="td"].on`).forEach(b => b.classList.remove('on'));
  btn.classList.add('on');
}

function getTEActive(id, g) {
  return [...document.querySelectorAll(`[data-tid="${id}"][data-g="${g}"].on`)].map(b => b.dataset.v);
}

function updateTEDistPills(id) {
  const venues  = getTEActive(id, 'tv');
  const courses = getTEActive(id, 'tc');
  const prev    = getTEActive(id, 'td')[0];
  let pool = all;
  if (venues.length)  pool = pool.filter(r => venues.includes(r['場所名']));
  if (courses.length) pool = pool.filter(r => courses.includes(r['コースC']));
  const dists = [...new Set(pool.map(r => r['距離']).filter(Boolean))]
    .sort((a, b) => parseInt(a) - parseInt(b));
  const row = document.getElementById(`te-dist-${id}`);
  if (!row) return;
  row.innerHTML = dists.length
    ? dists.map(d => `<button class="pill${d===prev?' on':''}" data-tid="${id}" data-g="td" data-v="${d}" onclick="togTEDist(this)">${parseInt(d).toLocaleString()}m</button>`).join('')
    : `<span style="color:var(--dim);font-size:13px">該当なし</span>`;
}

// ── タイム入力の自動送り ──────────────────────────────────────────────

function autoAdvanceSetup(slotId) {
  const minEl = document.getElementById(`ts-min-${slotId}`);
  if (minEl) minEl.addEventListener('input', () => {
    if (minEl.value.length >= 1) document.getElementById(`ts-sec-${slotId}`)?.focus();
  });
  const secEl = document.getElementById(`ts-sec-${slotId}`);
  if (secEl) secEl.addEventListener('input', () => {
    if (secEl.value.length >= 2) document.getElementById(`ts-tenth-${slotId}`)?.focus();
  });
  const aSecEl = document.getElementById(`ts-as-${slotId}`);
  if (aSecEl) aSecEl.addEventListener('input', () => {
    if (aSecEl.value.length >= 2) document.getElementById(`ts-at-${slotId}`)?.focus();
  });
  const mSecEl = document.getElementById(`ts-ms-${slotId}`);
  if (mSecEl) mSecEl.addEventListener('input', () => {
    if (mSecEl.value.length >= 2) document.getElementById(`ts-mt-${slotId}`)?.focus();
  });
  const m5SecEl = document.getElementById(`ts-m5s-${slotId}`);
  if (m5SecEl) m5SecEl.addEventListener('input', () => {
    if (m5SecEl.value.length >= 2) document.getElementById(`ts-m5t-${slotId}`)?.focus();
  });
}

function readTime(id, prefix) {
  const m = parseFloat(document.getElementById(`${prefix}-min-${id}`)?.value) || 0;
  const s = parseFloat(document.getElementById(`${prefix}-sec-${id}`)?.value);
  const t = parseFloat(document.getElementById(`${prefix}-tenth-${id}`)?.value) || 0;
  if (isNaN(s)) return null;
  return Math.round((m * 60 + s + t / 10) * 10) / 10;
}
function read3F(id, secId, tenthId) {
  const s = parseFloat(document.getElementById(secId)?.value);
  const t = parseFloat(document.getElementById(tenthId)?.value) || 0;
  if (isNaN(s)) return null;
  return Math.round((s + t / 10) * 10) / 10;
}

// ── 統計計算 ─────────────────────────────────────────────────────────

function removeOutliers(arr) {
  if (arr.length < 8) return [...arr];
  const s = [...arr].sort((a, b) => a - b), n = s.length;
  const q1 = s[Math.floor(n * 0.25)], q3 = s[Math.floor(n * 0.75)];
  const iqr = q3 - q1;
  if (iqr === 0) return [...arr];
  const lo = q1 - 1.5 * iqr, hi = q3 + 1.5 * iqr;
  return arr.filter(v => v >= lo && v <= hi);
}

function stats(vals) {
  if (!vals.length) return null;
  const n   = vals.length;
  const avg = vals.reduce((s, v) => s + v, 0) / n;
  const std = Math.sqrt(vals.reduce((s, v) => s + (v - avg) ** 2, 0) / n);
  const trimmed  = removeOutliers(vals);
  const trimAvg  = trimmed.reduce((s, v) => s + v, 0) / trimmed.length;
  const pctFaster = (today) => Math.round(vals.filter(v => v > today).length / n * 100);
  return { n, avg, std, trimAvg, trimN: trimmed.length, removedN: n - trimmed.length, pctFaster,
           min: Math.min(...vals), max: Math.max(...vals) };
}

// ── 期間フィルタ ─────────────────────────────────────────────────────

function parseYYMMDD(s) {
  if (!s || s.length < 6) return null;
  return new Date(2000 + +s.slice(0,2), +s.slice(2,4) - 1, +s.slice(4,6));
}

function filterByPeriod(races, period, fromVal, toVal) {
  if (period === 'all') return races;
  const today = new Date();
  let lo, hi;
  if (period === '1y')     { lo = new Date(today.getFullYear()-1, today.getMonth(), today.getDate()); hi = today; }
  else if (period === '2y'){ lo = new Date(today.getFullYear()-2, today.getMonth(), today.getDate()); hi = today; }
  else if (period === '3y'){ lo = new Date(today.getFullYear()-3, today.getMonth(), today.getDate()); hi = today; }
  else if (period === 'pm'){
    const py = today.getFullYear()-1, m = today.getMonth();
    lo = new Date(py, m-1, 1); hi = new Date(py, m+2, 0);
  }
  else if (period === 'ps'){
    const py = today.getFullYear()-1, m = today.getMonth();
    lo = new Date(py, m-2, 1); hi = new Date(py, m+3, 0);
  }
  else if (period === 'custom'){
    lo = fromVal ? new Date(fromVal) : null;
    hi = toVal   ? new Date(toVal)   : null;
  }
  return races.filter(r => {
    const d = parseYYMMDD(r['年月日']);
    if (!d) return false;
    if (lo && d < lo) return false;
    if (hi && d > hi) return false;
    return true;
  });
}

// ── 比較実行 ─────────────────────────────────────────────────────────

function compareTrend(entryId, slotId) {
  const todayTime  = readTime(slotId, 'ts');
  if (!todayTime)  { showToast('❗ 1着タイムを入力してください'); return; }
  const todayAgari = read3F(slotId, `ts-as-${slotId}`, `ts-at-${slotId}`);
  const todayMae3F = read3F(slotId, `ts-ms-${slotId}`, `ts-mt-${slotId}`);
  const todayMae5F = read3F(slotId, `ts-m5s-${slotId}`, `ts-m5t-${slotId}`);

  const venues  = getTEActive(entryId, 'tv');
  const courses = getTEActive(entryId, 'tc');
  const dists   = getTEActive(entryId, 'td');
  const babas   = getTEActive(entryId, 'tb');
  const clss    = getTEActive(entryId, 'tcls');
  const gens    = getTEActive(entryId, 'tgen');
  const period  = getTEActive(entryId, 'tp')[0] || 'all';
  const fromVal = document.getElementById(`te-from-${entryId}`)?.value;
  const toVal   = document.getElementById(`te-to-${entryId}`)?.value;

  let pool = filterByPeriod(all, period, fromVal, toVal);
  pool = pool.filter(r => {
    if (venues.length  && !venues.includes(r['場所名']))    return false;
    if (courses.length && !courses.includes(r['コースC']))  return false;
    if (dists.length   && !dists.includes(r['距離']))       return false;
    if (babas.length   && !babas.includes(r['馬場状態C']))  return false;
    if (clss.length    && !clss.includes(r['クラスC']))     return false;
    if (gens.length    && !gens.includes(r['世代限定C']))   return false;
    return true;
  });

  const timeVals  = pool.map(r => parseFloat(r['1着タイム'])).filter(v => v > 0 && !isNaN(v));
  const agariVals = pool.map(r => parseFloat(r['1着上り3F'])).filter(v => v > 0 && !isNaN(v));
  const mae3FVals = pool.map(r => parseFloat(r['前3F通過'])).filter(v => v > 0 && !isNaN(v));
  const mae5FVals = pool.map(r => parseFloat(r['前5F通過'])).filter(v => v > 0 && !isNaN(v));

  const condLabel  = buildCondLabel(venues, courses, dists, babas, clss, gens, period, fromVal, toVal);
  const resultData = {
    condLabel, pool: pool.length,
    venues, courses, dists,
    timeStats:  stats(timeVals),  todayTime,  timeVals,
    agariStats: stats(agariVals), todayAgari, agariVals,
    mae3FStats: stats(mae3FVals), todayMae3F, mae3FVals,
    mae5FStats: stats(mae5FVals), todayMae5F, mae5FVals,
  };
  renderTrendResult(slotId, resultData);
  storeTrendResult(slotId, entryId, resultData);
}

function buildCondLabel(venues, courses, dists, babas, clss, gens, period, f, t) {
  const parts = [];
  if (venues.length)  parts.push(venues.join('・'));
  if (courses.length) parts.push(courses.join('/'));
  if (dists.length)   parts.push(parseInt(dists[0]).toLocaleString() + 'm');
  if (babas.length)   parts.push(babas.map(b => BABA[b]).join('/'));
  if (clss.length)    parts.push(clss.map(c => CLS_LBL[c]).join('/'));
  if (gens.length)    parts.push(gens.map(g => GEN_LBL[g]).join('/'));
  const P = {'all':'全期間','1y':'直近1年','2y':'直近2年','3y':'直近3年',
              'pm':'前年同月','ps':'前年同季','custom':'カスタム'};
  const pLabel = P[period] || period;
  const dateRange = period === 'custom' ? `（${f||''}〜${t||''}）` : '';
  return (parts.join(' ') || '全条件') + `  [${pLabel}${dateRange}]`;
}

// ── 結果描画 ─────────────────────────────────────────────────────────

function renderTrendResult(slotId, d) {
  const el = document.getElementById(`ts-result-${slotId}`);
  if (!el) return;
  if (!d.pool || !d.timeStats) {
    el.innerHTML = `<div class="tr-empty">条件に合うレースが見つかりませんでした</div>`;
    return;
  }

  function secBlock(label, st, todayVal, vals) {
    if (!st || todayVal == null) return '';
    const diff     = todayVal - st.avg;
    const diffTrim = todayVal - st.trimAvg;
    const cls  = (d) => d < -0.05 ? 'faster' : d > 0.05 ? 'slower' : 'same';
    const sign = (d) => d < -0.05 ? '▼' : d > 0.05 ? '▲' : '±';
    const word = (d) => d < -0.05 ? '速い' : d > 0.05 ? '遅い' : '同じ';
    const pct  = st.pctFaster(todayVal);
    return `
<div class="tr-section">
  <div class="tr-sec-title">${label}</div>
  <div class="tr-grid">
    <div class="tr-cell">
      <div class="tr-k">今日のタイム</div>
      <div class="tr-v today">${fmtTime(todayVal)}</div>
    </div>
    <div class="tr-cell">
      <div class="tr-k">過去平均 <span style="font-weight:400">(N=${st.n})</span></div>
      <div class="tr-v">${fmtTime(st.avg.toFixed(1))}</div>
      <div class="tr-sub">σ=${st.std.toFixed(2)}  最速${fmtTime(st.min.toFixed(1))} 最遅${fmtTime(st.max.toFixed(1))}</div>
    </div>
    <div class="tr-cell">
      <div class="tr-k">全体平均との差</div>
      <div class="tr-v ${cls(diff)}">${sign(diff)} ${Math.abs(diff).toFixed(1)}秒 ${word(diff)}</div>
    </div>
    <div class="tr-cell">
      <div class="tr-k">外れ値除外平均との差</div>
      <div class="tr-v ${cls(diffTrim)}">${sign(diffTrim)} ${Math.abs(diffTrim).toFixed(1)}秒 ${word(diffTrim)}</div>
      <div class="tr-sub">除外 ${st.removedN}件 / 残 ${st.trimN}件</div>
    </div>
  </div>
  <div class="tr-pct">過去 <em>${pct}%</em> のレースより速いタイム</div>
</div>`;
  }

  const klabHTML = buildTrendKlabLinks(d.venues, d.courses, d.dists);
  el.innerHTML = `
<div class="tr-card">
  <div class="tr-cond">${d.condLabel}  /  対象 ${d.pool}件</div>
  ${klabHTML}
  ${secBlock('1着タイム', d.timeStats, d.todayTime, d.timeVals)}
  ${secBlock('上り3F', d.agariStats, d.todayAgari, d.agariVals)}
  ${secBlock('前3F', d.mae3FStats, d.todayMae3F, d.mae3FVals)}
  ${secBlock('前5F', d.mae5FStats, d.todayMae5F, d.mae5FVals)}
</div>
<button class="btn-to-summary" onclick="scrollToSummary()">📋 比較一覧を見る ↓</button>`;
}

function parseLapPaste(slotId) {
  const ta  = document.getElementById(`ts-lap-${slotId}`);
  const msg = document.getElementById(`ts-lap-msg-${slotId}`);
  const raw = ta.value.trim();
  if (!raw) {
    ta.className = 'lap-paste';
    msg.className = 'lap-parsed';
    msg.textContent = '';
    return;
  }
  const parts = raw.split(/\s*[-–—]\s*/).map(s => s.trim()).filter(s => s);
  const laps  = parts.map(s => parseFloat(s));
  if (laps.some(isNaN) || laps.length < 3) {
    ta.className = 'lap-paste err';
    msg.className = 'lap-parsed err';
    msg.textContent = `エラー: ラップデータを認識できません（${laps.length} 区間）`;
    return;
  }
  const t = laps.map(v => Math.round(v * 10));
  const total  = t.reduce((a, b) => a + b, 0);
  const totSec = Math.floor(total / 10);
  const totTen = total % 10;
  const totMin = Math.floor(totSec / 60);
  const totRem = totSec % 60;
  document.getElementById(`ts-min-${slotId}`).value   = totMin;
  document.getElementById(`ts-sec-${slotId}`).value   = totRem;
  document.getElementById(`ts-tenth-${slotId}`).value = totTen;
  const mae3 = t.slice(0, 3).reduce((a, b) => a + b, 0);
  document.getElementById(`ts-ms-${slotId}`).value = Math.floor(mae3 / 10);
  document.getElementById(`ts-mt-${slotId}`).value = mae3 % 10;
  const agari3 = t.slice(-3).reduce((a, b) => a + b, 0);
  document.getElementById(`ts-as-${slotId}`).value = Math.floor(agari3 / 10);
  document.getElementById(`ts-at-${slotId}`).value = agari3 % 10;
  if (laps.length >= 5) {
    const mae5 = t.slice(0, 5).reduce((a, b) => a + b, 0);
    document.getElementById(`ts-m5s-${slotId}`).value = Math.floor(mae5 / 10);
    document.getElementById(`ts-m5t-${slotId}`).value = mae5 % 10;
  }
  ta.className = 'lap-paste ok';
  msg.className = 'lap-parsed';
  const fmt3F = v => `${Math.floor(v/10)}.${v%10}`;
  msg.textContent = `✓ ${laps.length}区間 | タイム ${totMin}:${String(totRem).padStart(2,'0')}.${totTen} | 前3F ${fmt3F(mae3)} | 上がり3F ${fmt3F(agari3)}`;
}
